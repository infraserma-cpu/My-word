
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infraserma App</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#050a15">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/7133/7133312.png">

    <style>
        :root { --primary: #00ff88; --bg: #050a15; --accent: #3b82f6; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding: 0; }
        .app-container { max-width: 450px; margin: auto; min-height: 100vh; display: flex; flex-direction: column; }
        
        /* الهيدر بحال الأبليكاسيون */
        .app-header { background: #0f172a; padding: 20px; text-align: center; border-bottom: 1px solid #1e293b; border-radius: 0 0 25px 25px; }
        #clock { font-size: 2.5rem; font-weight: bold; color: var(--primary); }

        .content { padding: 20px; flex-grow: 1; }
        
        .card { background: #1e293b; border-radius: 20px; padding: 15px; margin-bottom: 20px; border-left: 5px solid var(--accent); }
        .card h3 { margin: 0 0 10px 0; font-size: 16px; display: flex; align-items: center; gap: 8px; }

        .btn-install { background: var(--primary); color: #000; padding: 12px; border-radius: 12px; text-align: center; font-weight: bold; text-decoration: none; display: block; margin: 10px 0; font-size: 14px; }

        .ad-box { background: rgba(0,0,0,0.4); border-radius: 15px; padding: 10px; min-height: 100px; margin-top: 10px; border: 1px dashed #334155; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="app-header">
        <div style="font-size: 12px; color: var(--accent); margin-bottom: 5px;">INFRASERMA OS v1.0</div>
        <div id="clock">00:00:00</div>
    </div>

    <div class="content">
        <div class="card">
            <h3>🛠️ Arduino Lab</h3>
            <p style="font-size: 13px; color: #94a3b8; margin: 0;">نظام التحكم في لوحات P10 وجدولة الإعلانات الذكية.</p>
        </div>

        <div class="ad-box">
            <script async="async" data-cfasync="false" src="https://pl29421713.profitablecpmratenetwork.com/70099a1518bd10ece70abdd0eb3f4d23/invoke.js"></script>
            <div id="container-70099a1518bd10ece70abdd0eb3f4d23"></div>
        </div>

        <div class="card" style="border-left-color: #f59e0b;">
            <h3>🚗 Peugeot 407 Service</h3>
            <p style="font-size: 13px; color: #94a3b8; margin: 0;">تشخيص أعطال BSI وتحديث خرائط RT4/RT5.</p>
        </div>

        <a href="https://wa.me/212661680524" class="btn-install">📱 طلب دعم فني مباشر</a>
        
        <p style="text-align: center; font-size: 11px; color: #475569;">اضغط على "إضافة إلى الشاشة الرئيسية" لتثبيت التطبيق</p>
    </div>
</div>

<script>
    function update() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString('ar-MA', { hour12: false });
    }
    setInterval(update, 1000); update();
</script>

</body>
</html>
