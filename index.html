<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ezzedine | Infraserma Tech</title>
    <style>
        :root { --primary: #00ff88; --bg: #050a15; --accent: #3b82f6; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding-bottom: 50px; }
        
        .container { max-width: 450px; margin: auto; padding: 20px; }
        
        /* كارت البروفايل */
        .profile-card { background: linear-gradient(145deg, #0f172a, #1e293b); border-radius: 30px; padding: 25px; text-align: center; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        #clock { font-size: 3.2rem; font-weight: bold; color: var(--primary); text-shadow: 0 0 20px rgba(0,255,136,0.3); }

        /* رسم دياكرام افتراضي بالـ CSS */
        .tech-monitor { background: #000; border: 2px solid #334155; border-radius: 15px; padding: 15px; margin-top: 25px; position: relative; overflow: hidden; }
        .tech-monitor::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,255,136,0.05) 3px); pointer-events: none; }
        .bar-container { display: flex; align-items: flex-end; justify-content: space-around; height: 60px; margin-top: 10px; }
        .bar { width: 15px; background: var(--primary); border-radius: 3px 3px 0 0; animation: bounce 1.5s infinite ease-in-out; }
        
        @keyframes bounce { 0%, 100% { height: 30%; } 50% { height: 80%; } }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .stat-box { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 10px; text-align: center; font-size: 12px; }
        .stat-val { display: block; font-weight: bold; color: var(--accent); font-size: 16px; }

        .btn { display: block; padding: 15px; margin: 20px 0; border-radius: 15px; text-decoration: none; color: white; font-weight: bold; background: #25D366; text-align: center; }
        .ad-space { margin: 20px 0; min-height: 100px; background: rgba(255,255,255,0.02); border-radius: 15px; border: 1px dashed #334155; }
    </style>
</head>
<body>
    <div class="container">
        <div class="profile-card">
            <div id="greeting" style="color: var(--accent); font-size: 14px;">Infraserma Lab ⚡</div>
            <div id="clock">00:00:00</div>
            <h2 style="margin: 10px 0;">عز الدين</h2>
            <p style="color: #94a3b8; font-size: 14px;">متخصص في الأنظمة المدمجة وميكانيك السيارات</p>
        </div>

        <div class="tech-monitor">
            <span style="font-size: 11px; color: var(--primary); font-family: monospace;">> SYSTEM_MONITOR: ACTIVE</span>
            <div class="bar-container">
                <div class="bar" style="animation-delay: 0.1s"></div>
                <div class="bar" style="animation-delay: 0.3s"></div>
                <div class="bar" style="animation-delay: 0.2s"></div>
                <div class="bar" style="animation-delay: 0.4s"></div>
                <div class="bar" style="animation-delay: 0.5s"></div>
            </div>
            <div class="stat-grid">
                <div class="stat-box">Arduino CPU<span class="stat-val" id="cpu-val">45%</span></div>
                <div class="stat-box">OBDII Connection<span class="stat-val" style="color: #25D366;">READY</span></div>
            </div>
        </div>

        <a href="https://wa.me/212661680524" class="btn">📱 تواصل لطلب الخدمات</a>

        <div class="ad-space">
            <script async="async" data-cfasync="false" src="https://pl29421713.profitablecpmratenetwork.com/70099a1518bd10ece70abdd0eb3f4d23/invoke.js"></script>
            <div id="container-70099a1518bd10ece70abdd0eb3f4d23"></div>
        </div>

        <div style="padding: 15px; background: rgba(255,255,255,0.05); border-radius: 15px; font-size: 14px; line-height: 1.6;">
            <h3 style="color: var(--primary); margin-top: 0;">لماذا Infraserma؟</h3>
            نقدم حلولاً مبتكرة في برمجة اللوحات الإعلانية، صيانة إلكترونيات السيارات، وتطوير أنظمة التحكم الآلي بمدينة فاس.
        </div>
    </div>

    <script>
        function update() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('ar-MA', { hour12: false });
            // تحريك أرقام عشوائية باش يبان السيستم خدام
            document.getElementById('cpu-val').innerText = Math.floor(Math.random() * (60 - 30) + 30) + "%";
        }
        setInterval(update, 1000); update();
    </script>
</body>
</html>
