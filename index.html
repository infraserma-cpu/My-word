<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عز الدين - النسخة الذكية</title>
    <style>
        :root { --primary: #00ff88; --bg: #0f172a; --card-bg: rgba(30, 41, 59, 0.8); }
        body { background-color: var(--bg); color: #fff; font-family: sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow-x: hidden; }
        .main-card { background: var(--card-bg); backdrop-filter: blur(15px); width: 90%; max-width: 400px; padding: 30px 20px; border-radius: 30px; text-align: center; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        #clock { font-size: 2.8rem; font-weight: 800; margin: 10px 0; color: var(--primary); text-shadow: 0 0 20px rgba(0,255,136,0.3); }
        .btn { display: flex; align-items: center; justify-content: center; width: 100%; padding: 14px; margin: 12px 0; border-radius: 15px; text-decoration: none; font-weight: bold; transition: 0.3s; }
        .btn-wa { background: #25D366; color: white; }
        .btn-outline { background: rgba(255, 255, 255, 0.05); color: white; border: 1px solid rgba(255, 255, 255, 0.1); }
        .ad-container { margin-top: 25px; padding: 10px; border-radius: 20px; background: rgba(0,0,0,0.3); min-height: 100px; border: 1px dashed rgba(255,255,255,0.1); }
    </style>
</head>
<body>
    <div class="main-card">
        <div id="greeting" style="color: var(--primary); font-weight: bold; margin-bottom: 5px;">عاشق الليل 🌙</div>
        <div id="clock">00:00:00</div>
        <h1 style="font-size: 24px; margin: 5px 0;">عز الدين</h1>
        <p style="color: #94a3b8; font-size: 14px; margin-bottom: 25px;">مبتكر تقني | فاس 🇲🇦</p>

        <a href="https://wa.me/212661680524" class="btn btn-wa">📱 واتساب مباشر</a>
        <a href="#" class="btn btn-outline">🛠️ مشاريع Arduino</a>
        <a href="#" class="btn btn-outline">🚗 صيانة Peugeot 407</a>

        <div class="ad-container">
            <script async="async" data-cfasync="false" src="https://pl29421713.profitablecpmratenetwork.com/70099a1518bd10ece70abdd0eb3f4d23/invoke.js"></script>
            <div id="container-70099a1518bd10ece70abdd0eb3f4d23"></div>
        </div>

        <div style="margin-top: 25px; font-size: 11px; color: #475569;">Infraserma Tech 2026 ©</div>
    </div>

    <script>
        function updateUI() {
            const now = new Date();
            const h = now.getHours();
            document.getElementById('clock').innerText = now.toLocaleTimeString('ar-MA', { hour12: false });
            let message = (h >= 5 && h < 12) ? "صباح الخير ☀️" : (h >= 12 && h < 18) ? "مساء الخير ☕" : (h >= 18 && h < 22) ? "ليلة سعيدة ✨" : "عاشق الليل 🌙";
            document.getElementById('greeting').innerText = message;
        }
        setInterval(updateUI, 1000); updateUI();
    </script>
</body>
</html>
