<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عز الدين - Infraserma</title>
    <style>
        :root {
            --primary: #00ff88;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.8);
        }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .main-card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            width: 90%;
            max-width: 400px;
            padding: 30px 20px;
            border-radius: 30px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #greeting { color: var(--primary); font-weight: bold; font-size: 1.1rem; }
        
        #clock {
            font-size: 2.8rem;
            font-weight: 800;
            margin: 10px 0;
            text-shadow: 0 0 15px rgba(0, 255, 136, 0.2);
        }

        .profile-name { font-size: 24px; margin: 5px 0; letter-spacing: 1px; }
        
        .tagline { color: #94a3b8; font-size: 14px; margin-bottom: 25px; }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 14px;
            margin: 12px 0;
            border-radius: 15px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .btn-wa { background: #25D366; color: white; border: none; }
        .btn-wa:hover { background: #1eb954; transform: scale(1.02); }

        .btn-outline { background: rgba(255, 255, 255, 0.05); color: white; }
        .btn-outline:hover { background: var(--primary); color: #000; }

        /* مساحة الإشهار الاحترافية */
        .ad-container {
            margin-top: 25px;
            padding: 15px;
            border: 1px dashed #475569;
            border-radius: 20px;
            background: rgba(0,0,0,0.2);
        }

        .ad-label { font-size: 10px; color: #64748b; text-transform: uppercase; margin-bottom: 8px; display: block; }
        
        .footer { margin-top: 25px; font-size: 11px; color: #475569; }
    </style>
</head>
<body>

    <div class="main-card">
        <div id="greeting">جاري التحميل...</div>
        <div id="clock">00:00:00</div>
        
        <h1 class="profile-name">عز الدين</h1>
        <p class="tagline">مبتكر تقني | فاس 🇲🇦</p>

        <a href="https://wa.me/212661680524" class="btn btn-wa">
            📱 واتساب مباشر
        </a>

        <a href="#" class="btn btn-outline">🛠️ مشاريع Arduino</a>
        <a href="#" class="btn btn-outline">🚗 صيانة Peugeot 407</a>

        <div class="ad-container">
            <span class="ad-label">مساحة إعلانية جاهزة للربح</span>
            <div id="ad-space" style="color: #64748b; font-size: 13px;">
                سيظهر الإعلان هنا بعد تفعيل Adsterra
            </div>
        </div>

        <div class="footer">© 2026 Infraserma Tech</div>
    </div>

    <script>
        function updateUI() {
            const now = new Date();
            const h = now.getHours();
            
            // تحديث الوقت
            document.getElementById('clock').innerText = now.toLocaleTimeString('ar-MA', { hour12: false });

            // الترحيب الذكي
            let message = "";
            if (h >= 5 && h < 12) message = "صباح الخير ☀️";
            else if (h >= 12 && h < 18) message = "مساء الخير ☕";
            else if (h >= 18 && h < 22) message = "ليلة سعيدة ✨";
            else message = "عاشق الليل 🌙";
            
            document.getElementById('greeting').innerText = message;
        }

        setInterval(updateUI, 1000);
        updateUI();
    </script>
</body>
</html>
