<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STE INFRASERMA</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            margin: 0; 
            background: #111; /* لون احتياطي */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white; 
            text-align: center; 
            transition: background 0.5s ease;
        }
        .overlay { 
            background: rgba(0, 0, 0, 0.7); 
            min-height: 100vh; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        .logo-box { 
            background: white; 
            padding: 10px; 
            border-radius: 15px; 
            border: 4px solid #ffcc00; 
            margin-top: 20px; 
            width: 150px; 
        }
        .logo-box img { width: 100%; height: auto; }
        h1#site-title { color: #ffcc00; font-size: 2.2em; margin: 15px 0 5px 0; }
        .section-card { 
            background: #1a2634; 
            margin: 12px 0; 
            padding: 20px; 
            border-radius: 15px; 
            width: 90%; 
            max-width: 450px; 
            border-right: 10px solid #ffcc00; 
            text-align: right; 
        }
        .btn-whatsapp { 
            background-color: #2ecc71; 
            color: white; 
            padding: 18px 35px; 
            border-radius: 50px; 
            text-decoration: none; 
            font-weight: bold; 
            margin: 25px 0; 
            display: inline-block; 
        }
    </style>
</head>
<body>
<div class="overlay">
    <div class="logo-box">
        <img src="https://i.ibb.co/dJ0dGbG0/f7643c66-93d5-45ba-8c90-7ddd5b70250e-20250619-191428-0000.png" alt="Infraserma">
    </div>
    
    <h1 id="site-title">STE INFRASERMA</h1>
    <p id="site-subtitle">Infrastructures Service Maroc</p>

    <div class="section-card">
        <h3 id="service1-title">🚜 قسم التجهيز والحفر</h3>
        <p id="service1-desc">حفر وتجهيز قنوات الصرف الصحي وبناء البنية التحتية الأساسية.</p>
    </div>

    <div class="section-card">
        <h3 id="service2-title">🏗️ الأشغال الكبرى والخرسانة</h3>
        <p id="service2-desc">تنفيذ مشاريع البناء والخرسانة المسلحة (Béton armé).</p>
    </div>

    <a href="https://wa.me/212661680524" class="btn-whatsapp">تواصل معنا عبر واتساب</a>

    <div style="font-size: 0.8em; opacity: 0.6; margin-top: 20px;">© 2026 Infraserma</div>
</div>

<script>
    // هاد الجزء هو اللي كيجيب المعلومات من لوحة التحكم
    window.onload = function() {
        // جلب الخلفية من التخزين
        const savedBg = localStorage.getItem('siteBackground');
        if (savedBg) {
            document.body.style.backgroundImage = "url('" + savedBg + "')";
        } else {
            // خلفية افتراضية إذا لم يتم تغييرها
            document.body.style.backgroundImage = "url('https://images.unsplash.com/photo-1541888946425-d81bb19480c5?q=80&w=1350')";
        }

        // جلب النصوص إذا تم تغييرها في لوحة التحكم
        if(localStorage.getItem('mainTitle')) document.getElementById('site-title').innerText = localStorage.getItem('mainTitle');
        if(localStorage.getItem('service1Title')) document.getElementById('service1-title').innerText = localStorage.getItem('service1Title');
    };
</script>
</body>
</html>
