<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background-color: #f0f2f5; color: #333; }

</header>
<div class="container">
    <div class="project-card">
        <h3>تجهيز البنية التحتية المتكاملة - فاس</h3>
        <p>نقدم خبرتنا في التجهيز الكامل: شبكات الماء الصالح للشرب، الصرف الصحي، الكهرباء، والإنارة العمومية، وتهيئة الطرق.</p>
