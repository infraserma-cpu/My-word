<!DOCTYPE html>

        .btn { display: block; padding: 12px; margin: 10px 0; border-radius: 12px; text-decoration: none; font-weight: bold; color: #fff; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); }
