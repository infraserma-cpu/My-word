<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عز الدين - النسخة الاحترافية</title>
    <style>
        body { background: #0f172a; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: rgba(30, 41, 59, 0.9); padding: 30px; border-radius: 25px; text-align: center; width: 85%; max-width: 350px; border: 1px solid #1e293b; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        #clock { font-size: 2.5rem; font-weight: bold; color: #00ff88; margin: 15px 0; }
        #greeting { font-size: 1.2rem; color: #94a3b8; }
        .btn { display: block; width: 100%; padding: 12px; margin: 10px 0; border-radius: 12px; text-decoration: none; font-weight: bold; transition: 0.3s; }
        .btn-wa { background: #25D366; color: white; }
        .btn-normal { background: #1e293b; color: white; border: 1px solid #334155; }
    </style>
</head>
<body>
    <div class="card">
        <div id="greeting">مرحباً</div>
        <div id="clock">00:00:00</div>
        <h1 style="font-size: 1.5rem; margin: 10px 0;">عز الدين</h1>
        <p style="font-size: 0.9rem; color: #64748b;">مبتكر تقني | فاس 🇲🇦</p>
        <a href="https://wa.me/212661680524" class="btn btn-wa">واتساب مباشر</a>
        <a href="#" class="btn btn-normal">مشاريع Arduino</a>
        <a href="#" class="btn btn-normal">صيانة Peugeot 407</a>
    </div>
    <script>
        function update() {
            const now = new Date();
            const hour = now.getHours();
            document.getElementById('clock').innerText = now.toLocaleTimeString('ar-MA');
            let msg = (hour < 12) ? "صباح الخير ☀️" : (hour < 18) ? "مساء الخير ☕" : "ليلة سعيدة ✨";
            document.getElementById('greeting').innerText = msg;
        }
        setInterval(update, 1000); update();
    </script>
</body>
</html>
