<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>STE INFRASERMA</title>
    <style>
        body { font-family: Arial; margin: 0; background: #111; color: white; text-align: center; }
        .overlay { padding: 20px; }
        .section-card { background: #1a2634; margin: 15px auto; padding: 15px; border-radius: 15px; border-right: 8px solid #ffcc00; text-align: right; max-width: 500px; }
        .section-card img { width: 100%; border-radius: 10px; margin-bottom: 10px; }
        .btn-whatsapp { background: #25d366; padding: 15px 30px; border-radius: 50px; display: inline-block; color: white; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
<div class="overlay">
    <h1>STE INFRASERMA</h1>
    <div id="services-list"></div>
    <a href="https://wa.me/212661680524" class="btn-whatsapp">تواصل عبر واتساب</a>
</div>
<script>
    // هاد الكود كيجيب البيانات من الـ LocalStorage ديال هاد النطاق
    window.addEventListener('storage', () => location.reload());
    const services = JSON.parse(localStorage.getItem('siteServices') || '[]');
    const list = document.getElementById('services-list');
    
    if(services.length > 0) {
        services.forEach(s => {
            list.innerHTML += `<div class="section-card">
                ${s.img ? `<img src="${s.img}">` : ''}
                <h3>${s.title}</h3>
                <p>${s.desc}</p>
            </div>`;
        });
    } else {
        list.innerHTML = '<p>جاري تحميل البيانات...</p>';
    }
</script>
</body>
</html>
