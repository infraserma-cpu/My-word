<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STE INFRASERMA</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #111 no-repeat center center fixed; background-size: cover; color: white; text-align: center; }
        .overlay { background: rgba(0, 0, 0, 0.7); min-height: 100vh; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .logo-box { background: white; padding: 10px; border-radius: 15px; border: 4px solid #ffcc00; margin-top: 20px; width: 140px; }
        .logo-box img { width: 100%; height: auto; }
        h1 { color: #ffcc00; font-size: 2em; margin: 15px 0; }
        .services-container { width: 100%; max-width: 500px; }
        .section-card { background: #1a2634; margin: 15px 0; border-radius: 15px; overflow: hidden; border-right: 8px solid #ffcc00; text-align: right; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .section-card img { width: 100%; height: 180px; object-fit: cover; display: none; }
        .card-content { padding: 15px; }
        .card-content h3 { color: #ffcc00; margin: 0 0 8px 0; }
        .btn-whatsapp { background-color: #25d366; color: white; padding: 15px 30px; border-radius: 50px; text-decoration: none; font-weight: bold; margin: 20px 0; display: inline-block; }
    </style>
</head>
<body>
<div class="overlay">
    <div class="logo-box">
        <img src="https://i.ibb.co/dJ0dGbG0/f7643c66-93d5-45ba-8c90-7ddd5b70250e-20250619-191428-0000.png" alt="Infraserma">
    </div>
    <h1>STE INFRASERMA</h1>
    <div id="services-list" class="services-container"></div>
    <a href="https://wa.me/212661680524" class="btn-whatsapp">تواصل عبر واتساب</a>
</div>
<script>
    window.onload = function() {
        // تحديث الخلفية
        const bg = localStorage.getItem('siteBg');
        if (bg) document.body.style.backgroundImage = "url('" + bg + "')";
        // عرض الأقسام
        const services = JSON.parse(localStorage.getItem('siteServices') || '[]');
        const list = document.getElementById('services-list');
        if(services.length === 0) {
            list.innerHTML = '<div class="section-card"><div class="card-content"><h3>🚜 التجهيز والحفر</h3><p>حفر وتجهيز قنوات الصرف الصحي.</p></div></div>';
        } else {
            services.forEach(s => {
                const card = document.createElement('div');
                card.className = 'section-card';
                let imgHtml = s.img ? `<img src="${s.img}" style="display:block">` : '';
                card.innerHTML = `${imgHtml}<div class="card-content"><h3>${s.title}</h3><p>${s.desc}</p></div>`;
                list.appendChild(card);
            });
        }
    };
</script>
</body>
</html>
