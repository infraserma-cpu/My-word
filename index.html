<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Infraserma - رفع مشاريع التجهيز</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .upload-section { background: #1e293b; padding: 20px; border-radius: 15px; border: 2px dashed #fbbf24; margin: 20px auto; max-width: 400px; }
        #preview { width: 100%; max-width: 300px; border-radius: 10px; margin-top: 15px; display: none; }
        .btn-upload { background: #fbbf24; color: #000; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <h1>لوحة تحكم Infraserma 🏗️</h1>
    <p>ارفع صور مشاريع القوادز، الرخام، أو صيانة Peugeot 407</p>

    <div class="upload-section">
        <input type="file" id="imageInput" accept="image/*" style="margin-bottom: 10px;">
        <br>
        <button class="btn-upload" onclick="uploadImage()">رفع الصورة للموقع</button>
        <div id="status"></div>
        <img id="preview" src="" alt="معاينة">
    </div>

    <script>
        async function uploadImage() {
            const fileInput = document.getElementById('imageInput');
            const status = document.getElementById('status');
            const preview = document.getElementById('preview');
            
            if (fileInput.files.length === 0) {
                status.innerText = "المرجو اختيار صورة أولاً!";
                return;
            }

            status.innerText = "جاري الرفع...";
            const formData = new FormData();
            formData.append('image', fileInput.files[0]);

            try {
                // استعملنا الـ API Key ديالك هنا
                const response = await fetch('https://api.imgbb.com/1/upload?key=D15da8bf11c924f88a1523a728688254', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (result.success) {
                    status.innerText = "تم الرفع بنجاح!";
                    preview.src = result.data.url;
                    preview.style.display = "block";
                    console.log("رابط الصورة المباشر:", result.data.url);
                    alert("تم الرفع! الرابط هو: " + result.data.url);
                } else {
                    status.innerText = "خطأ في الرفع، حاول مرة أخرى.";
                }
            } catch (error) {
                status.innerText = "فشل الاتصال بـ ImgBB.";
                console.error(error);
            }
        }
    </script>
</body>
</html>
