<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STE INFRASERMA</title>
    <style>
        body { font-family: Arial; margin: 0; background: #111 url('https://i.ibb.co/vSdwFyB/IMG-20190628-WA0020.jpg') no-repeat center center fixed; background-size: cover; color: white; text-align: center; }
        .overlay { background: rgba(0, 0, 0, 0.7); min-height: 100vh; padding: 20px; }
        .section-card { background: rgba(26, 38, 52, 0.9); margin: 15px auto; padding: 15px; border-radius: 15px; border-right: 8px solid #ffcc00; text-align: right; max-width: 450px; }
        .section-card img { width: 100%; border-radius: 10px; }
        .btn-whatsapp { background: #25d366; padding: 15px 30px; border-radius: 50px; color: white; text-decoration: none; font-weight: bold; display: inline-block; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="overlay">
        <img src="https://i.ibb.co/dJ0dGbG0/f7643c66-93d5-45ba-8c90-7ddd5b70250e-20250619-191428-0000.png" width="100">
        <h1>STE INFRASERMA</h1>
        <div id="main-list"></div>
        <a href="https://wa.me/212661680524" class="btn-whatsapp">تواصل عبر واتساب</a>
    </div>

    <script>
        // هاد الكود غيخليه يقرا السلعة بلا ما تحتاج حاسوب
        function loadContent() {
            const data = JSON.parse(localStorage.getItem('myInfrasermaData') || '[]');
            const list = document.getElementById('main-list');
            list.innerHTML = data.map(item => `
                <div class="section-card">
                    <img src="${item.img}">
                    <h3>${item.title}</h3>
                    <p>${item.desc}</p>
                </div>
            `).join('');
        }
        loadContent();
    </script>
</body>
</html>
