<!DOCTYPE html>
<html lang="ar" dir="rtl">
<body style="text-align:center; font-family:Arial; padding:20px;">
    <h2>لوحة تحكم Infraserma</h2>
    <input id="t" placeholder="عنوان الخدمة" style="width:80%; padding:10px;"><br><br>
    <textarea id="d" placeholder="وصف الخدمة" style="width:80%; padding:10px;"></textarea><br><br>
    <input id="i" placeholder="رابط الصورة من ImgBB" style="width:80%; padding:10px;"><br><br>
    <button onclick="add()" style="padding:15px 30px; background:green; color:white;">إضافة الخدمة فوراً</button>
    <button onclick="localStorage.clear(); location.reload();" style="margin-top:20px; background:red; color:white;">مسح كل شيء</button>

    <script>
        function add() {
            const s = JSON.parse(localStorage.getItem('myInfrasermaData') || '[]');
            s.push({ title: document.getElementById('t').value, desc: document.getElementById('d').value, img: document.getElementById('i').value });
            localStorage.setItem('myInfrasermaData', JSON.stringify(s));
            alert("تم بنجاح! حل الموقع دابا غتلقاها زادت.");
        }
    </script>
</body>
</html>
