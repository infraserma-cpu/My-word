<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - INFRASERMA</title>
    <style>
        body { font-family: Arial; padding: 40px; text-align: center; background: #eee; }
        .card { background: white; padding: 30px; border-radius: 15px; display: inline-block; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input { width: 80%; padding: 12px; margin: 15px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 12px 25px; background: #ffcc00; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2>إعدادات الموقع</h2>
        <p>انسخ رابط الصورة هنا لتغيير الخلفية:</p>
        <input type="text" id="bgInput" placeholder="https://example.com/image.jpg">
        <br>
        <button onclick="save()">تحديث الخلفية</button>
        <p id="msg"></p>
        <hr>
        <a href="index.html">الرجوع للموقع</a>
    </div>
    <script>
        function save() {
            const val = document.getElementById('bgInput').value;
            if(val) {
                localStorage.setItem('siteBg', val);
                document.getElementById('msg').innerText = "✅ تم تحديث الخلفية بنجاح!";
            }
        }
    </script>
</body>
</html>
