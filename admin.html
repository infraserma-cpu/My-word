<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة الموقع</title>
</head>
<body style="text-align:center; padding:20px;">
    <h2>إضافة خدمة</h2>
    <input id="t" placeholder="العنوان"><br><br>
    <textarea id="d" placeholder="الوصف"></textarea><br><br>
    <input id="i" placeholder="رابط الصورة المباشر"><br><br>
    <button onclick="save()">إضافة</button>
    <script>
        function save() {
            const s = JSON.parse(localStorage.getItem('siteServices') || '[]');
            s.push({ title: document.getElementById('t').value, desc: document.getElementById('d').value, img: document.getElementById('i').value });
            localStorage.setItem('siteServices', JSON.stringify(s));
            alert("تمت الإضافة! دابا سير للموقع.");
        }
    </script>
</body>
</html>
